<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 - 장비 사용 일지</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2130;
    --surface-2: #242d40;
    --border: #2f3a52;
    --text: #e8ecf4;
    --text-dim: #8a95ab;
    --accent: #4ade80;
    --danger: #f87171;
    --blue: #60a5fa;
    --warning: #fbbf24;
    --purple: #a78bfa;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }

  /* PIN */
  .pin-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .pin-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 380px; width: 100%;
    text-align: center;
  }
  .pin-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .pin-box p { color: var(--text-dim); margin-bottom: 28px; font-size: 14px; }
  .pin-display { display: flex; justify-content: center; gap: 14px; margin-bottom: 24px; }
  .pin-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: all 0.15s;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-error { color: var(--danger); font-size: 13px; height: 18px; margin-bottom: 16px; }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-key {
    height: 60px;
    background: var(--surface-2);
    border: none; border-radius: 12px;
    color: var(--text);
    font-size: 22px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pin-key:hover { background: var(--border); }
  .pin-key:active { transform: scale(0.95); }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 {
    font-size: 20px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .open-app-btn {
    padding: 8px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; text-decoration: none;
  }
  .open-app-btn:hover { background: var(--border); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* TABS */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    padding: 4px; border-radius: 12px;
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .tab {
    flex: 1; min-width: 100px;
    padding: 12px;
    background: transparent; border: none;
    color: var(--text-dim);
    font-size: 14px; font-weight: 600;
    border-radius: 9px; cursor: pointer;
    white-space: nowrap;
  }
  .tab.active { background: var(--surface-2); color: var(--text); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px;
    border-radius: 12px;
  }
  .stat-value {
    font-size: 32px; font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px; color: var(--text-dim);
    margin-top: 6px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* CHARTS */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title {
    font-size: 14px; font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chart-title .toggle {
    display: flex; gap: 4px;
    background: var(--bg);
    padding: 3px; border-radius: 7px;
  }
  .chart-title .toggle button {
    padding: 4px 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 11px; font-weight: 600;
    border-radius: 5px; cursor: pointer;
  }
  .chart-title .toggle button.active {
    background: var(--surface-2);
    color: var(--text);
  }
  .chart-container {
    position: relative;
    height: 280px;
  }
  .chart-empty {
    height: 280px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* PPT EXPORT BOX */
  .ppt-export-box {
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(96, 165, 250, 0.08));
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
    display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap;
  }
  .ppt-export-box .icon { font-size: 28px; }
  .ppt-export-box .info { flex: 1; min-width: 200px; }
  .ppt-export-box .title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .ppt-export-box .sub { font-size: 12px; color: var(--text-dim); }
  .ppt-export-box select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
  }

  /* FORMS */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    margin-bottom: 16px;
    align-items: end;
  }
  .form-group label {
    display: block;
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 600;
  }
  .form-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
  }
  .form-group input:focus { outline: none; border-color: var(--blue); }

  .btn {
    padding: 12px 18px;
    border: none; border-radius: 9px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-secondary { background: var(--surface-2); color: var(--text); }

  /* LIST */
  .list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    max-height: 500px;
    overflow-y: auto;
  }
  .list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-radius: 8px;
  }
  .list-item:hover { background: var(--surface-2); }
  .list-item-info { flex: 1; }
  .list-item-main { font-size: 14px; font-weight: 600; }
  .list-item-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .icon-btn {
    width: 34px; height: 34px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer; font-size: 14px;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--danger); }

  /* TABLE */
  .table-controls {
    display: flex; gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .table-controls input {
    flex: 1; min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
  }
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    max-height: 600px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    text-align: left;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th {
    background: var(--surface-2);
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.05em;
    position: sticky; top: 0;
  }
  .empty-row { text-align: center !important; padding: 40px !important; color: var(--text-dim); }
  .photo-thumbs {
    display: flex; gap: 4px;
  }
  .photo-thumb {
    width: 32px; height: 32px;
    border-radius: 5px;
    object-fit: cover;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: transform 0.15s;
  }
  .photo-thumb:hover { transform: scale(1.5); border-color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed; top: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px; font-weight: 500;
    z-index: 200;
    transform: translateX(120%);
    transition: transform 0.3s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(0); }
  .toast.success { border-color: var(--accent); }
  .toast.error { border-color: var(--danger); }

  /* MODAL (for photo viewer) */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal-photo {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
  }
  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
  }

  /* WARNING */
  .warning-box {
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid var(--warning);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--warning);
    line-height: 1.6;
  }
  .warning-box strong { color: var(--warning); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    .header { padding: 14px 18px; }
    .container { padding: 16px; }
    .chart-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-screen" id="pin-screen">
  <div class="pin-box">
    <h1>🔒 관리자 로그인</h1>

<!-- MAIN -->

  <div class="container">

<script>
// ===== Supabase API =====
function sbHeaders() {
  return {
    'apikey': SUPABASE_PUBLISHABLE_KEY,
    'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
    'Content-Type': 'application/json'
  };
}

async function sbGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: sbHeaders() });
  if (!res.ok) throw new Error(`GET ${path}: ${res.status} ${await res.text()}`);
  return res.json();
}

async function sbInsert(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`INSERT ${table}: ${res.status} ${await res.text()}`);
  return res.json();
}

async function sbDelete(table, id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE',
    headers: sbHeaders()
  });
  if (!res.ok) throw new Error(`DELETE ${table}: ${res.status}`);
}

// ===== STATE =====
let users = [], prs = [], logs = [], equipment = null;
let userMetric = 'count';
let prMetric = 'count';
let monthMetric = 'count';
let chartUser = null, chartPR = null, chartMonth = null;

// ===== PIN =====
let pinInput = '';

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function pinPress(d) {
  if (pinInput.length >= 4) return;
  pinInput += d;
  updatePinDisplay();
  if (pinInput.length === 4) {
    setTimeout(async () => {
      const inputHash = await sha256(pinInput);
      if (inputHash === ADMIN_PIN_HASH) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('admin-main').style.display = 'block';
        init();
      } else {
        document.getElementById('pin-error').textContent = 'PIN이 올바르지 않습니다';
        pinInput = '';
        updatePinDisplay();
      }
    }, 150);
  }
}

function pinDelete() { pinInput = pinInput.slice(0, -1); updatePinDisplay(); }
function pinClear() { pinInput = ''; updatePinDisplay(); document.getElementById('pin-error').textContent = ''; }

function updatePinDisplay() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`pd-${i}`).classList.toggle('filled', i < pinInput.length);
  }
}

document.addEventListener('keydown', (e) => {
  if (document.getElementById('pin-screen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  else if (e.key === 'Backspace') pinDelete();
});

}

function renderLogs() {
  const body = document.getElementById('logs-body');
  const search = (document.getElementById('search')?.value || '').toLowerCase().trim();
  const filtered = search ? logs.filter(l => {
    const u = users.find(x => x.id === l.user_id);
    const p = prs.find(x => x.id === l.pr_id);
    const userName = (u?.name || l.user_name_snapshot || '').toLowerCase();
    const prName = (p?.name || l.pr_name_snapshot || '').toLowerCase();
    const note = (l.note || '').toLowerCase();
    return userName.includes(search) || prName.includes(search) || note.includes(search);
  }) : logs;

  if (filtered.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="empty-row">기록이 없습니다</td></tr>';
    return;
  }

  body.innerHTML = filtered.map(log => {
    const u = users.find(x => x.id === log.user_id);
    const p = prs.find(x => x.id === log.pr_id);
    const userName = u ? u.name : (log.user_name_snapshot || '(삭제됨)');
    const prName = p ? p.name : (log.pr_name_snapshot || '(삭제됨)');
    const photos = log.photo_urls || [];
    const photoHtml = photos.length > 0
      ? `<div class="photo-thumbs">${photos.map(url => `<img src="${url}" class="photo-thumb" onclick="openPhotoModal('${url}')">`).join('')}</div>`
      : '-';
    return `
      <tr>
        <td>${formatDateTime(new Date(log.created_at))}</td>
        <td>${escapeHtml(userName)}</td>
        <td>${escapeHtml(prName)}</td>
        <td style="text-align:center">${log.sample_count}</td>
        <td>${escapeHtml(log.note || '-')}</td>
        <td>${photoHtml}</td>
        <td><button class="icon-btn" onclick="deleteLog(${log.id})">🗑</button></td>
      </tr>
    `;
  }).join('');
}

const chartColors = [
  '#4ade80', '#60a5fa', '#a78bfa', '#fb923c', '#f87171',
  '#fbbf24', '#34d399', '#22d3ee', '#f472b6', '#94a3b8'
];

function aggregateByUser(logsData) {
  const stats = {};
  logsData.forEach(l => {
    const u = users.find(x => x.id === l.user_id);
    const name = u ? u.name : (l.user_name_snapshot || '(삭제됨)');
    if (!stats[name]) stats[name] = { count: 0, samples: 0 };
    stats[name].count++;
    stats[name].samples += (l.sample_count || 0);
  });
  return Object.entries(stats).sort((a,b) => b[1].count - a[1].count);
}

function aggregateByPR(logsData) {
  const stats = {};
  logsData.forEach(l => {
    const p = prs.find(x => x.id === l.pr_id);
    const name = p ? p.name : (l.pr_name_snapshot || '(삭제됨)');
    if (!stats[name]) stats[name] = { count: 0, samples: 0 };
    stats[name].count++;
    stats[name].samples += (l.sample_count || 0);
  });
  return Object.entries(stats).sort((a,b) => b[1].count - a[1].count);
}

function renderUserChart() {
  const canvas = document.getElementById('chart-user');
  if (!canvas) return;
  if (chartUser) { chartUser.destroy(); chartUser = null; }
  const sorted = aggregateByUser(logs);
  if (sorted.length === 0) {
    canvas.parentElement.innerHTML = '<div class="chart-empty">기록이 없습니다</div>';
    return;
  }
  const sortedM = sorted.slice().sort((a,b) => b[1][userMetric] - a[1][userMetric]);
  chartUser = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: sortedM.map(s => s[0]),
      datasets: [{
        label: userMetric === 'count' ? '기록 수' : '샘플 수',
        data: sortedM.map(s => s[1][userMetric]),
        backgroundColor: chartColors.slice(0, sortedM.length),
        borderRadius: 6
      }]
    },
    options: chartOpts(userMetric === 'count' ? '기록 수' : '샘플 수')
  });
}

function renderPRChart() {
  const canvas = document.getElementById('chart-pr');
  if (!canvas) return;
  if (chartPR) { chartPR.destroy(); chartPR = null; }
  const sorted = aggregateByPR(logs);
  if (sorted.length === 0) {
    canvas.parentElement.innerHTML = '<div class="chart-empty">기록이 없습니다</div>';
    return;
  }
  const sortedM = sorted.slice().sort((a,b) => b[1][prMetric] - a[1][prMetric]);
  chartPR = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: sortedM.map(s => s[0]),
      datasets: [{
        data: sortedM.map(s => s[1][prMetric]),
        backgroundColor: chartColors.slice(0, sortedM.length),
        borderColor: '#1a2130',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#e8ecf4', font: { size: 12 }, padding: 10 }
        }
      }
    }
  });
}

function renderMonthChart() {
  const canvas = document.getElementById('chart-month');
  if (!canvas) return;
  if (chartMonth) { chartMonth.destroy(); chartMonth = null; }

  const now = new Date();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
      label: `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`,
      count: 0,
      samples: 0
    });
  }
  logs.forEach(l => {
    const d = new Date(l.created_at);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const m = months.find(x => x.key === key);
    if (m) {
      m.count++;
      m.samples += (l.sample_count || 0);
    }
  });

  chartMonth = new Chart(canvas, {
    type: 'line',
    data: {
      labels: months.map(m => m.label),
      datasets: [{
        label: monthMetric === 'count' ? '기록 수' : '샘플 수',
        data: months.map(m => m[monthMetric]),
        backgroundColor: 'rgba(74, 222, 128, 0.1)',
        borderColor: '#4ade80',
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#4ade80'
      }]
    },
    options: chartOpts(monthMetric === 'count' ? '기록 수' : '샘플 수')
  });
}

function chartOpts(yLabel) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#8a95ab' }, grid: { color: 'rgba(143, 149, 171, 0.1)' } },
      y: {
        ticks: { color: '#8a95ab', stepSize: 1 },
        grid: { color: 'rgba(143, 149, 171, 0.1)' },
        beginAtZero: true,
        title: { display: true, text: yLabel, color: '#8a95ab' }
      }
    }
  };
}

// ===== CSV =====
function exportCSV() {
  if (logs.length === 0) { toast('내보낼 기록이 없습니다', 'error'); return; }
  const headers = ['일시','사용자','학번/사번','PR','PR 설명','샘플 갯수','특이사항','사진수'];
  const rows = logs.map(log => {
    const u = users.find(x => x.id === log.user_id);
    const p = prs.find(x => x.id === log.pr_id);
    return [
      formatDateTime(new Date(log.created_at)),
      u ? u.name : (log.user_name_snapshot || '(삭제됨)'),
      u ? (u.student_id || '') : '',
      p ? p.name : (log.pr_name_snapshot || '(삭제됨)'),
      p ? (p.description || '') : '',
      log.sample_count,
      (log.note || '').replace(/"/g, '""'),
      (log.photo_urls || []).length
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `${equipment?.name || 'equipment'}_log_${ts}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ CSV 다운로드 완료');
}

// ===== PPT EXPORT =====
async function exportPPT() {
  const monthKey = document.getElementById('ppt-month-select').value;
  if (!monthKey) { toast('월을 선택하세요', 'error'); return; }

  const btn = document.getElementById('btn-export-ppt');
  btn.disabled = true;
  btn.textContent = 'PPT 생성 중...';

  try {
    const [year, month] = monthKey.split('-').map(Number);
    const start = new Date(year, month - 1, 1).getTime();
    const end = new Date(year, month, 1).getTime();
    const monthLogs = logs.filter(l => {
      const t = new Date(l.created_at).getTime();
      return t >= start && t < end;
    });

    if (monthLogs.length === 0) {
      toast('해당 월에 기록이 없습니다', 'error');
      btn.disabled = false;
      btn.textContent = '📥 PPT 다운로드';
      return;
    }

    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE'; // 13.33 x 7.5 inch
    pptx.title = `${equipment?.name || '장비'} 사용 일지 - ${year}년 ${month}월`;

    const equipmentName = equipment?.name || '장비 사용 일지';
    const totalSamples = monthLogs.reduce((sum, l) => sum + (l.sample_count || 0), 0);
    const userStats = aggregateByUser(monthLogs);
    const prStats = aggregateByPR(monthLogs);

    // === SLIDE 1: 표지 ===
    let slide = pptx.addSlide();
    slide.background = { color: '0F1419' };
    slide.addText(`${equipmentName}`, {
      x: 0.5, y: 2.0, w: 12.3, h: 0.8,
      fontSize: 36, bold: true, color: '4ADE80', fontFace: 'Calibri', align: 'center'
    });
    slide.addText(`사용 일지 월별 정산`, {
      x: 0.5, y: 3.0, w: 12.3, h: 0.6,
      fontSize: 24, color: 'E8ECF4', fontFace: 'Calibri', align: 'center'
    });
    slide.addText(`${year}년 ${month}월`, {
      x: 0.5, y: 3.8, w: 12.3, h: 1.0,
      fontSize: 48, bold: true, color: '60A5FA', fontFace: 'Calibri', align: 'center'
    });
    const generatedAt = new Date();
    slide.addText(`생성일: ${formatDateTime(generatedAt)}`, {
      x: 0.5, y: 6.5, w: 12.3, h: 0.3,
      fontSize: 12, color: '8A95AB', fontFace: 'Calibri', align: 'center'
    });

    // === SLIDE 2: 요약 통계 ===
    slide = pptx.addSlide();
    slide.background = { color: '0F1419' };
    slide.addText('📊 월간 요약', {
      x: 0.5, y: 0.3, w: 12.3, h: 0.6,
      fontSize: 28, bold: true, color: 'E8ECF4', fontFace: 'Calibri'
    });
    slide.addShape('line', {
      x: 0.5, y: 1.0, w: 12.3, h: 0,
      line: { color: '4ADE80', width: 2 }
    });

    // 4개의 통계 카드
    const cards = [
      { label: '총 기록 수', value: monthLogs.length.toString(), color: '4ADE80' },
      { label: '총 샘플 수', value: totalSamples.toString(), color: '60A5FA' },
      { label: '활동 사용자', value: userStats.length.toString(), color: 'A78BFA' },
      { label: '사용된 PR 종류', value: prStats.length.toString(), color: 'FB923C' }
    ];
    const cardW = 2.8, cardH = 1.8, gap = 0.3;
    const totalW = cards.length * cardW + (cards.length - 1) * gap;
    const startX = (13.33 - totalW) / 2;
    cards.forEach((c, i) => {
      const x = startX + i * (cardW + gap);
      slide.addShape('roundRect', {
        x, y: 1.5, w: cardW, h: cardH,
        fill: { color: '1A2130' },
        line: { color: '2F3A52', width: 1 },
        rectRadius: 0.1
      });
      slide.addText(c.value, {
        x, y: 1.7, w: cardW, h: 0.9,
        fontSize: 44, bold: true, color: c.color, fontFace: 'Calibri', align: 'center'
      });
      slide.addText(c.label, {
        x, y: 2.7, w: cardW, h: 0.4,
        fontSize: 14, color: '8A95AB', fontFace: 'Calibri', align: 'center'
      });
    });

    // 일별 추이
    const daily = {};
    for (let d = 1; d <= 31; d++) daily[d] = 0;
    monthLogs.forEach(l => {
      const day = new Date(l.created_at).getDate();
      daily[day] = (daily[day] || 0) + 1;
    });
    const lastDay = new Date(year, month, 0).getDate();
    const dailyLabels = [];
    const dailyData = [];
    for (let d = 1; d <= lastDay; d++) {
      dailyLabels.push(`${d}`);
      dailyData.push(daily[d] || 0);
    }
    slide.addText('📅 일별 사용 추이', {
      x: 0.5, y: 3.7, w: 12.3, h: 0.4,
      fontSize: 18, bold: true, color: 'E8ECF4', fontFace: 'Calibri'
    });
    slide.addChart(pptx.ChartType.line, [{
      name: '기록 수',
      labels: dailyLabels,
      values: dailyData
    }], {
      x: 0.5, y: 4.2, w: 12.3, h: 3.0,
      chartColors: ['4ADE80'],
      lineSize: 3,
      lineDataSymbol: 'circle',
      lineDataSymbolSize: 6,
      catAxisLabelColor: '8A95AB',
      valAxisLabelColor: '8A95AB',
      catAxisLabelFontSize: 10,
      valAxisLabelFontSize: 10,
      showLegend: false,
      showTitle: false,
      plotArea: { fill: { color: '1A2130' } },
      chartArea: { fill: { color: '0F1419' }, border: { color: '2F3A52', pt: 1 } }
    });

    // === SLIDE 3: 사용자별 통계 ===
    slide = pptx.addSlide();
    slide.background = { color: '0F1419' };
    slide.addText('👥 사용자별 통계', {
      x: 0.5, y: 0.3, w: 12.3, h: 0.6,
      fontSize: 28, bold: true, color: 'E8ECF4', fontFace: 'Calibri'
    });
    slide.addShape('line', {
      x: 0.5, y: 1.0, w: 12.3, h: 0,
      line: { color: '4ADE80', width: 2 }
    });

    if (userStats.length > 0) {
      // 막대 차트
      slide.addChart(pptx.ChartType.bar, [{
        name: '기록 수',
        labels: userStats.map(s => s[0]),
        values: userStats.map(s => s[1].count)
      }, {
        name: '샘플 수',
        labels: userStats.map(s => s[0]),
        values: userStats.map(s => s[1].samples)
      }], {
        x: 0.5, y: 1.4, w: 7.5, h: 5.7,
        barDir: 'bar',
        chartColors: ['4ADE80', '60A5FA'],
        catAxisLabelColor: '8A95AB',
        valAxisLabelColor: '8A95AB',
        catAxisLabelFontSize: 11,
        valAxisLabelFontSize: 10,
        showLegend: true,
        legendPos: 't',
        legendColor: 'E8ECF4',
        legendFontSize: 11,
        showTitle: false,
        plotArea: { fill: { color: '1A2130' } },
        chartArea: { fill: { color: '0F1419' }, border: { color: '2F3A52', pt: 1 } }
      });

      // 표
      const tableRows = [
        [
          { text: '사용자', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 12, fontFace: 'Calibri' } },
          { text: '기록 수', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 12, fontFace: 'Calibri', align: 'center' } },
          { text: '샘플 수', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 12, fontFace: 'Calibri', align: 'center' } }
        ],
        ...userStats.map(s => [
          { text: s[0], options: { color: 'E8ECF4', fontSize: 11, fontFace: 'Calibri' } },
          { text: String(s[1].count), options: { color: 'E8ECF4', fontSize: 11, fontFace: 'Calibri', align: 'center' } },
          { text: String(s[1].samples), options: { color: 'E8ECF4', fontSize: 11, fontFace: 'Calibri', align: 'center' } }
        ])
      ];
      slide.addTable(tableRows, {
        x: 8.3, y: 1.4, w: 4.5,
        colW: [2.0, 1.25, 1.25],
        border: { type: 'solid', color: '2F3A52', pt: 1 },
        fontSize: 11,
        rowH: 0.4
      });
    }

    // === SLIDE 4: PR별 통계 ===
    slide = pptx.addSlide();
    slide.background = { color: '0F1419' };
    slide.addText('🧪 PR별 사용 통계', {
      x: 0.5, y: 0.3, w: 12.3, h: 0.6,
      fontSize: 28, bold: true, color: 'E8ECF4', fontFace: 'Calibri'
    });
    slide.addShape('line', {
      x: 0.5, y: 1.0, w: 12.3, h: 0,
      line: { color: '4ADE80', width: 2 }
    });

    if (prStats.length > 0) {
      // 도넛 차트
      slide.addChart(pptx.ChartType.doughnut, [{
        name: '기록 수',
        labels: prStats.map(s => s[0]),
        values: prStats.map(s => s[1].count)
      }], {
        x: 0.5, y: 1.4, w: 6.5, h: 5.7,
        chartColors: chartColors.map(c => c.replace('#','')),
        showLegend: true,
        legendPos: 'r',
        legendColor: 'E8ECF4',
        legendFontSize: 11,
        showTitle: false,
        showPercent: true,
        dataLabelColor: 'FFFFFF',
        dataLabelFontSize: 10,
        plotArea: { fill: { color: '1A2130' } },
        chartArea: { fill: { color: '0F1419' }, border: { color: '2F3A52', pt: 1 } }
      });

      // 표
      const prTableRows = [
        [
          { text: 'PR 종류', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 12, fontFace: 'Calibri' } },
          { text: '기록 수', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 12, fontFace: 'Calibri', align: 'center' } },
          { text: '샘플 수', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 12, fontFace: 'Calibri', align: 'center' } }
        ],
        ...prStats.map(s => [
          { text: s[0], options: { color: 'E8ECF4', fontSize: 11, fontFace: 'Calibri' } },
          { text: String(s[1].count), options: { color: 'E8ECF4', fontSize: 11, fontFace: 'Calibri', align: 'center' } },
          { text: String(s[1].samples), options: { color: 'E8ECF4', fontSize: 11, fontFace: 'Calibri', align: 'center' } }
        ])
      ];
      slide.addTable(prTableRows, {
        x: 7.3, y: 1.4, w: 5.5,
        colW: [2.7, 1.4, 1.4],
        border: { type: 'solid', color: '2F3A52', pt: 1 },
        fontSize: 11,
        rowH: 0.4
      });
    }

    // === SLIDE 5+: 상세 기록 (페이지당 15개씩) ===
    const itemsPerPage = 15;
    const sortedLogs = monthLogs.slice().sort((a, b) =>
      new Date(a.created_at).getTime() - new Date(b.created_at).getTime()
    );
    const totalPages = Math.ceil(sortedLogs.length / itemsPerPage);

    for (let p = 0; p < totalPages; p++) {
      slide = pptx.addSlide();
      slide.background = { color: '0F1419' };
      slide.addText(`📋 상세 기록 (${p+1}/${totalPages})`, {
        x: 0.5, y: 0.3, w: 12.3, h: 0.6,
        fontSize: 24, bold: true, color: 'E8ECF4', fontFace: 'Calibri'
      });
      slide.addShape('line', {
        x: 0.5, y: 1.0, w: 12.3, h: 0,
        line: { color: '4ADE80', width: 2 }
      });

      const pageLogs = sortedLogs.slice(p * itemsPerPage, (p+1) * itemsPerPage);
      const headerRow = [
        { text: '일시', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 11, fontFace: 'Calibri' } },
        { text: '사용자', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 11, fontFace: 'Calibri' } },
        { text: 'PR', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 11, fontFace: 'Calibri' } },
        { text: '샘플', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 11, fontFace: 'Calibri', align: 'center' } },
        { text: '특이사항', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 11, fontFace: 'Calibri' } },
        { text: '사진', options: { bold: true, color: 'FFFFFF', fill: { color: '242D40' }, fontSize: 11, fontFace: 'Calibri', align: 'center' } }
      ];

      const dataRows = pageLogs.map(log => {
        const u = users.find(x => x.id === log.user_id);
        const pr = prs.find(x => x.id === log.pr_id);
        const userName = u ? u.name : (log.user_name_snapshot || '(삭제됨)');
        const prName = pr ? pr.name : (log.pr_name_snapshot || '(삭제됨)');
        return [
          { text: formatDateTime(new Date(log.created_at)), options: { color: 'E8ECF4', fontSize: 9, fontFace: 'Calibri' } },
          { text: userName, options: { color: 'E8ECF4', fontSize: 10, fontFace: 'Calibri' } },
          { text: prName, options: { color: 'E8ECF4', fontSize: 10, fontFace: 'Calibri' } },
          { text: String(log.sample_count), options: { color: 'E8ECF4', fontSize: 10, fontFace: 'Calibri', align: 'center' } },
          { text: log.note || '-', options: { color: 'E8ECF4', fontSize: 9, fontFace: 'Calibri' } },
          { text: (log.photo_urls || []).length > 0 ? `${log.photo_urls.length}장` : '-', options: { color: 'E8ECF4', fontSize: 10, fontFace: 'Calibri', align: 'center' } }
        ];
      });

      slide.addTable([headerRow, ...dataRows], {
        x: 0.5, y: 1.3, w: 12.3,
        colW: [1.8, 1.5, 2.0, 0.8, 5.0, 1.2],
        border: { type: 'solid', color: '2F3A52', pt: 1 },
        fontSize: 10,
        rowH: 0.35
      });
    }

    // 다운로드
    const fileName = `${equipmentName}_${year}년_${month}월_정산.pptx`;
    await pptx.writeFile({ fileName });

    toast('✓ PPT 다운로드 완료');
    btn.disabled = false;
    btn.textContent = '📥 PPT 다운로드';
  } catch (e) {
    console.error(e);
    toast('❌ PPT 생성 실패: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '📥 PPT 다운로드';
  }
}

// ===== HELPERS =====
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function formatDateTime(d) {
  const y = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${y}-${mo}-${da} ${h}:${mi}`;
}
